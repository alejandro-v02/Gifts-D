<span
  class="absolute bottom-0 rounded-full bg-gold blur-[1px] animate-fireflyRise"
  [style.left.%]="left"
  [style.width.px]="size"
  [style.height.px]="size"
  [style.animation-duration.s]="duration"
  [style.animation-delay.s]="delay"
  [style.box-shadow]="'0 0 ' + (size * 2) + 'px ' + (size / 2) + 'px rgba(201,151,77,0.6)'"
></span>
