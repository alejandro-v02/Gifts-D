<button type="button" [attr.aria-label]="label"
   class="glass flex items-center gap-3 px-5 py-3.5 rounded-2xl text-primary font-semibold
          transition-transform duration-300 hover:-translate-y-1 hover:scale-[1.02] cursor-pointer">

  <span class="w-9 h-9 rounded-full flex items-center justify-center text-white shrink-0"
        [style]="badgeStyle">
    <ng-container *ngIf="icon !== 'tiktok'; else tiktokIcon">
      <lucide-icon [name]="icon" [size]="18"></lucide-icon>
    </ng-container>
    <ng-template #tiktokIcon>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16.6 5.82s.51.5 0 0A4.278 4.278 0 0 1 15.54 3h-3.09v12.4a2.592 2.592 0 0 1-2.59 2.5c-1.42 0-2.6-1.16-2.6-2.6c0-1.72 1.66-3.01 3.37-2.48V9.66c-3.45-.46-6.47 2.22-6.47 5.64c0 3.33 2.76 5.7 5.69 5.7c3.14 0 5.69-2.55 5.69-5.7V9.01a7.35 7.35 0 0 0 4.3 1.38V7.3s-1.88.09-3.24-1.48z"/>
      </svg>
    </ng-template>
  </span>

  <span class="text-[15px]">{{ label }}</span>
</button>
