<div class="group relative rounded-3xl overflow-hidden shadow-lg shadow-primary/10 aspect-square">
  <img [src]="image" [alt]="caption"
       class="w-full h-full object-cover transition-transform duration-500 ease-out group-hover:scale-110" />

  <div class="absolute inset-0 flex items-end p-5
              bg-gradient-to-t from-primary/80 via-primary/0 to-transparent
              opacity-0 group-hover:opacity-100 transition-opacity duration-300">
    <span class="glass text-white px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2">
      <lucide-icon name="gift" [size]="16"></lucide-icon>
      {{ caption }}
    </span>
  </div>
</div>
