<div class="glass rounded-3xl p-7 text-center relative">
  <span class="absolute -top-4 -left-4 w-9 h-9 rounded-full bg-rose text-white
               flex items-center justify-center font-display text-sm font-bold shadow-md">
    {{ number }}
  </span>
  <div class="w-14 h-14 mx-auto rounded-2xl bg-gradient-to-br from-primaryLight to-primary
              flex items-center justify-center text-bg mb-4">
    <lucide-icon [name]="icon" [size]="24"></lucide-icon>
  </div>
  <h4 class="font-display text-lg text-primary mb-2">{{ title }}</h4>
  <p class="text-textSoft text-sm leading-relaxed">{{ text }}</p>
</div>
