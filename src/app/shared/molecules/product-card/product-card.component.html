<div class="glass rounded-[32px] p-8 text-left transition-all duration-500 ease-out
            hover:-translate-y-2 hover:shadow-2xl hover:shadow-primary/20
            hover:[transform:perspective(600px)_rotateX(4deg)_translateY(-8px)]">
  <app-icon-badge [icon]="icon"></app-icon-badge>
  <h3 class="font-display text-xl text-primary mt-5 mb-2.5">{{ title }}</h3>
  <p class="text-textSoft leading-relaxed">{{ description }}</p>
</div>
