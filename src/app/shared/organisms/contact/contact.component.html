<section id="contacto" class="px-[6vw] py-24 pb-28 max-w-3xl mx-auto text-center">
  <app-section-title eyebrow="Contacto" title="Cuéntanos tu idea"></app-section-title>
  <p class="text-textSoft mb-9">Escríbenos por el medio que prefieras y armamos tu caja perfecta.</p>
  <div class="flex justify-center flex-wrap gap-4">
    <app-social-link
      *ngFor="let s of socials"
      [icon]="s.icon"
      [label]="s.label"
      [href]="s.href">
    </app-social-link>
  </div>
</section>
