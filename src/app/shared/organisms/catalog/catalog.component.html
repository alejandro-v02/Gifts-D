<section id="catalogo" class="px-5 sm:px-[6vw] py-16 md:py-24 max-w-7xl mx-auto">
  <app-section-title eyebrow="Catálogo" title="Cajas para cada ocasión"></app-section-title>
  <div class="grid gap-5 md:gap-7 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
    <app-product-card
      *ngFor="let p of products"
      [icon]="p.icon"
      [title]="p.title"
      [description]="p.description">
    </app-product-card>
  </div>
</section>
