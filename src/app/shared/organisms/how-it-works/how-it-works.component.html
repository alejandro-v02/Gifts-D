<section class="px-[6vw] py-24 max-w-6xl mx-auto">
  <app-section-title eyebrow="Proceso" title="Cómo funciona"></app-section-title>
  <div class="grid gap-8 [grid-template-columns:repeat(auto-fit,minmax(220px,1fr))] pt-4">
    <app-step-item
      *ngFor="let s of steps; let i = index"
      [number]="i + 1"
      [icon]="s.icon"
      [title]="s.title"
      [text]="s.text">
    </app-step-item>
  </div>
</section>
