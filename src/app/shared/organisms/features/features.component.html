<section id="nosotros" class="px-5 sm:px-[6vw] py-16 md:py-24 max-w-5xl mx-auto">
  <app-section-title eyebrow="Nosotros" title="Por qué elegir nuestras cajas"></app-section-title>
  <div class="grid gap-8 md:gap-10 grid-cols-1 sm:grid-cols-2">
    <app-feature-item
      *ngFor="let i of items"
      [icon]="i.icon"
      [title]="i.title"
      [text]="i.text">
    </app-feature-item>
  </div>
</section>
