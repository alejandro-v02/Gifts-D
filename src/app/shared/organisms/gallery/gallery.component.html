<section id="galeria" class="px-[6vw] py-24 max-w-7xl mx-auto">
  <app-section-title eyebrow="Galería" title="Algunas de nuestras cajas"></app-section-title>
  <div class="grid gap-6 [grid-template-columns:repeat(auto-fit,minmax(240px,1fr))]">
    <app-gallery-item
      *ngFor="let p of photos"
      [image]="p.image"
      [caption]="p.caption">
    </app-gallery-item>
  </div>
  <p class="text-center text-textSoft text-sm mt-8 italic">
    * Fotos de referencia mientras subimos las cajas reales que hemos entregado.
  </p>
</section>
